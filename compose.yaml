services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-health}
      POSTGRES_USER: ${POSTGRES_USER:-health}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ghcr.io/danielpower/health/migrate:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-health}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-health}
      DBMATE_SCHEMA_FILE: /tmp/schema.sql
    depends_on:
      postgres:
        condition: service_healthy
    command: ["up"]

  collector:
    image: ghcr.io/danielpower/health/scale-collector:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-health}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-health}
      COLLECTOR_HOST: 0.0.0.0
      COLLECTOR_PORT: 8000
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - /var/run/dbus:/var/run/dbus:ro
    # BLE requires a Linux host's BlueZ service. Start privileged; reduce this
    # after verifying the adapter and host permissions for your hardware.
    privileged: true

  web:
    image: ghcr.io/danielpower/health/web:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-health}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-health}
      COLLECTOR_URL: http://collector:8000
      ORIGIN: ${ORIGIN:-http://localhost:3000}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

volumes:
  postgres-data:
